[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 200
evm_version = "paris"
via_ir = true

[rpc_endpoints]
somnia_testnet = "${SOMNIA_TESTNET_RPC}"
somnia_mainnet = "${SOMNIA_MAINNET_RPC}"

[etherscan]
somnia_testnet = { key = "${SOMNIA_EXPLORER_KEY}", url = "${SOMNIA_TESTNET_EXPLORER_API}" }
